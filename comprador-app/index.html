<body>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="comprador-data.js"></script>
<script type="text/babel" src="comprador-app.jsx"></script>

<script>
  // Registrar service worker (somente em https / produção).
  if ("serviceWorker" in navigator && location.protocol === "https:") {
    // Quando um SW novo assume o controle, recarrega 1x p/ pegar a versão nova na hora.
    var _refreshing = false;
    navigator.serviceWorker.addEventListener("controllerchange", function () {
      if (_refreshing) return;
      _refreshing = true;
      window.location.reload();
    });
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").then(function (reg) {
        // Checa por atualização a cada vez que o app abre.
        reg.update();
      }).catch(function () {});
    });
  }
</script>
</body>
</html>
